    <header>

            <li><a href="sales.html"><i class="fas fa-shopping-cart"></i> Sales</a></li>

            <li><a href="report.html"><i class="fas fa-file-alt"></i> Report</a></li>

            <li id="btn" style="cursor: pointer;"><i class="fas fa-sign-out-alt"></i> Logout</li></ul>

    <div id="message">
        <p>Are you sure you want to log out ?</p>
        <p id="confirm"><a href="login.html">Yes</a><span class="no"><a href="dashboard.html">Cancel</a></span></p>
    </div>
    <div class="main-content">
        <h2>Ledger</h2>
        <button id="link">View links</button>
        <input type="month" id="search-input">
        <button id="search-btn"><i class="fa-solid fa-search"></i> Search</button>
        <button id="print-btn"><i class="fa-solid fa-print"></i> Print</button>
        <div id="ledger-data" style="margin-top: 3%;"></div>
    </div>

    <script>
        // Retrieve finance and sales data from local storage
var financeData = JSON.parse(localStorage.getItem('finance'));
var salesData = JSON.parse(localStorage.getItem('sales'));

// Generate ledger for each month
var ledgerHtml = '';
var currentYear = new Date().getFullYear();
for (var month = 0; month < 12; month++) {
    var monthName = new Date(currentYear, month, 1).toLocaleString('default', { month: 'long' });
    var financeForMonth = financeData ? financeData.filter(finance => new Date(finance.dateIssue).getMonth() === month && new Date(finance.dateIssue).getFullYear() === currentYear) : [];
    var salesForMonth = salesData ? salesData.filter(sale => new Date(sale.date).getMonth() === month && new Date(sale.date).getFullYear() === currentYear) : [];
   
    ledgerHtml += `<div class="board">`;
    ledgerHtml += `<img src="images/logo.png" class="logo" style="float: left; width: 16%; margin-right: 6%; margin-top: 2%;  margin-left: 3%;">`;
    ledgerHtml += `<h3 style="font-size: 30px; margin-bottom: -2%;">IVAN COMPUTER SERVICES AINA</h3>`;
    ledgerHtml += `<h4 style="font-size: 20px; margin-bottom: -1%;">Ledger for ${monthName} ${currentYear}</h4>`;
    ledgerHtml += `<p style="font-size: 20px; margin-bottom: -1%;">Business Address: Opposite STAR N/P SCH, Yumbe, Uganda</p>`;
    ledgerHtml += `<p style="font-size: 20px;">Contact: +256 778007451, info@ivancomputerservices.com</p>`;
    ledgerHtml += `<table>`;
    ledgerHtml += `<tr><th>Date</th><th>Transaction Type</th><th>Amount</th></tr>`;
    financeForMonth.forEach(finance => {
        ledgerHtml += `<tr><td>${finance.dateIssue}</td><td>Finance</td><td>${finance.amountSigned}</td></tr>`;
    });
    salesForMonth.forEach(sale => {
        ledgerHtml += `<tr><td>${sale.date}</td><td>Sales</td><td>${sale.amount}</td></tr>`;
    });
    ledgerHtml += `</table>`;
    ledgerHtml += `<p style="margin-left: 3%;">Total Finance for ${monthName}: ${financeForMonth.reduce((acc, finance) => acc + parseFloat(finance.amountSigned), 0)}</p>`;
    ledgerHtml += `<p style="margin-left: 3%;">Total Sales for ${monthName}: ${salesForMonth.reduce((acc, sale) => acc + parseFloat(sale.amount), 0)}</p>`;
    ledgerHtml += `<hr>`;
    ledgerHtml += `</div>`;
}
document.getElementById('ledger-data').innerHTML = ledgerHtml;

// Print functionality
document.getElementById('print-btn').addEventListener('click', function() {
    window.print();
});

// Search functionality
document.getElementById('search-btn').addEventListener('click', function() {
    var searchInput = document.getElementById('search-input').value;
    var searchYear = searchInput.split('-')[0];
    var searchMonth = searchInput.split('-')[1];

    var financeForMonth = financeData ? financeData.filter(finance => new Date(finance.dateIssue).getMonth() === parseInt(searchMonth) - 1 && new Date(finance.dateIssue).getFullYear() === parseInt(searchYear)) : [];
    var salesForMonth = salesData ? salesData.filter(sale => new Date(sale.date).getMonth() === parseInt(searchMonth) - 1 && new Date(sale.date).getFullYear() === parseInt(searchYear)) : [];

    var ledgerHtml = '';
    ledgerHtml += `<div class="searched">`;
    ledgerHtml += `<img src="images/logo.png" style="float: left; width: 16%; margin-right: 6%; margin-top: 2%;  margin-left: 3%;">`;
    ledgerHtml += `<h3 style="font-size: 30px; margin-bottom: -2%;">IVAN COMPUTER SERVICES AINA</h3>`;
    ledgerHtml += `<h4 style="font-size: 20px; margin-bottom: -1%;">Ledger for ${new Date(searchYear, searchMonth - 1, 1).toLocaleString('default', { month: 'long' })} ${searchYear}</h4>`;
    ledgerHtml += `<p style="font-size: 20px; margin-bottom: -1%;">Business Address: Opposite Star Nur & Pri sch. Yumbe, Uganda</p>`;
    ledgerHtml += `<p style="font-size: 20px;">Contact: +256 778007451, info@ivancomputerservices.com</p>`;
    ledgerHtml += `<table style="margin-bottom: 10%;">`;
    ledgerHtml += `<tr><th>Date</th><th>Transaction Type</th><th>Amount</th></tr>`;
    financeForMonth.forEach(finance => {
        ledgerHtml += `<tr><td>${finance.dateIssue}</td><td>Finance</td><td>${finance.amountSigned}</td></tr>`;
    });
    salesForMonth.forEach(sale => {
        ledgerHtml += `<tr><td>${sale.date}</td><td>Sales</td><td>${sale.amount}</td></tr>`;
    });
    ledgerHtml += `</table>`;
    ledgerHtml += `<p style="margin-left: 3%;">Total Finance for ${monthName}: ${financeForMonth.reduce((acc, finance) => acc + parseFloat(finance.amountSigned), 0)}</p>`;
    ledgerHtml += `<p style="margin-left: 3%;">Total Sales for ${monthName}: ${salesForMonth.reduce((acc, sale) => acc + parseFloat(sale.amount), 0)}</p>`;
    ledgerHtml += `<hr>`;
    
    ledgerHtml += `</div>`;
    document.getElementById('ledger-data').innerHTML = ledgerHtml;
});

    window.location.href = 'file:///C:/Users/IT%20TECH%202025/Desktop/WEBSITES/IT%20DATA%20MONITOR%20SYSTEM/index.html';
});

cancelBtn.addEventListener('click', () => {
    logoutModal.style.display = 'none';
});
