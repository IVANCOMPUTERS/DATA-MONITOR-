    <script>
        // Retrieve finance data from local storage
var financeData = JSON.parse(localStorage.getItem('finance'));

// Organize finance data by month
var financeByMonth = {};
if (financeData !== null) {
  financeData.forEach(function(finance) {
    var date = new Date(finance.dateIssue);
    var month = date.toLocaleString('default', { month: 'long' });
    var year = date.getFullYear();
    if (!financeByMonth[year]) {
      financeByMonth[year] = {};
    }
    if (!financeByMonth[year][month]) {
      financeByMonth[year][month] = [];
    }
    financeByMonth[year][month].push(finance);
  });

  // Display finance data
  var currentYear = new Date().getFullYear();
  var financeHtml = '';
  if (financeByMonth[currentYear]) {
    Object.keys(financeByMonth[currentYear]).sort((a, b) => {
      var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      return months.indexOf(a) - months.indexOf(b);
    }).forEach(function(month) {
      financeHtml += `<h3>${month}</h3>`;
      financeHtml += `<div class="content">`;
      financeHtml += `<img src="images/logo.png" style="float: left; width: 25%; margin: 2% 2% 0 2%;">`;
      financeHtml += `<h1>IVAN COMPUTER SERVICES AINA</h1>`;
      financeHtml += `<h4 style="font-size: 20px; margin-bottom: -1%;">&nbsp;&nbsp;&nbsp;Address: Located opposite STAR N/P SCH - DONDI</h4>`;
      financeHtml += `<h4 style="font-size: 20px; margin-bottom: -1%;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Tel: 0778007451</h4>`;
      financeHtml += `<h4 style="font-size: 20px; margin-bottom: -1%;">&nbsp;&nbsp;&nbsp;Email: info@ivancomputerservces.com</h4>`;
      financeHtml += `<h4 style="font-size: 20px;">&nbsp;&nbsp;&nbsp;Website: www.ivancomputerservices.com</h4>`;
      financeHtml += `<br>`;
      financeHtml += `<hr>`;
      financeHtml += `<hr>`;
      financeHtml += `<u><h3>Table showing the expenses for ${month}</h3></u>`;
      financeHtml += `<table>`;
      financeHtml += `<tr><th>Date of Issue</th><th>Amount Signed</th><th>Form of Payment</th><th>Product Paid For</th><th>Quantity of Product</th></tr>`;
      financeByMonth[currentYear][month].forEach(function(finance) {
        financeHtml += `<tr><td>${finance.dateIssue}</td><td>${finance.amountSigned}</td><td>${finance.paymentMethod}</td><td>${finance.productPaid}</td><td>${finance.quantityProduct}</td></tr>`;
      });
      financeHtml += `</table>`;
      var totalAmount = financeByMonth[currentYear][month].reduce((acc, finance) => acc + parseFloat(finance.amountSigned), 0);
      financeHtml += `<p>Total Amount for ${month}: ${totalAmount}</p>`;
      financeHtml += `</div>`;
    });
    document.getElementById('finance-data').innerHTML = financeHtml;
  } else {
    document.getElementById('finance-data').innerHTML = 'No finance data available';
  }

  // Print functionality
  document.getElementById('print-btn').addEventListener('click', function() {
    window.print();
  });

  // Search functionality
  document.getElementById('search-btn').addEventListener('click', function() {
    var searchInput = document.getElementById('search-input').value.toLowerCase();
    var filteredFinance = financeData.filter(finance => {
      return finance.dateIssue.toLowerCase().includes(searchInput) ||
             finance.amountSigned.toString().includes(searchInput) ||
             finance.paymentMethod.toLowerCase().includes(searchInput) ||
             finance.productPaid.toLowerCase().includes(searchInput) ||
             finance.quantityProduct.toString().includes(searchInput);
    });

    var filteredFinanceHtml = '';
    filteredFinance.forEach(finance => {
      filteredFinanceHtml += `<p>Date of Issue: ${finance.dateIssue}, Amount Signed: ${finance.amountSigned}, Form of Payment: ${finance.paymentMethod}, Product Paid For: ${finance.productPaid}, Quantity of Product: ${finance.quantityProduct}</p>`;
    });
    document.getElementById('finance-data').innerHTML = filteredFinanceHtml;
  });
} else {
  document.getElementById('finance-data').innerHTML = 'No finance data available';
}
