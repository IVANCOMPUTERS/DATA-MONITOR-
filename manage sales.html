        <input type="search" id="search-input" placeholder="Search...">
        <button id="search-btn"><i class="fa-solid fa-search"></i> Search</button>

        <div id="sales-data"></div>

    <script>
        // Retrieve sales data from local storage
let salesData = JSON.parse(localStorage.getItem('sales'));

// Organize sales data by month
let salesByMonth = {};
if (salesData !== null) {
  salesData.forEach(sale => {
    let date = new Date(sale.date);
    let month = date.toLocaleString('default', { month: 'long' });
    let year = date.getFullYear();

    if (!salesByMonth[year]) {
      salesByMonth[year] = {};
    }
    if (!salesByMonth[year][month]) {
      salesByMonth[year][month] = [];
    }
    salesByMonth[year][month].push(sale);
  });

  // Display sales data
  let currentYear = new Date().getFullYear();
  let salesHtml = '';
  if (salesByMonth[currentYear]) {
    Object.keys(salesByMonth[currentYear]).sort((a, b) => {
      let months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      return months.indexOf(a) - months.indexOf(b);
    }).forEach(month => {
      salesHtml += `<h3>${month}</h3>`;
      salesHtml += `<table>`;
      salesHtml += `<tr><th>Date</th><th>Activity</th><th>Amount</th><th>Payment Method</th></tr>`;
      salesByMonth[currentYear][month].forEach(sale => {
        salesHtml += `<tr><td>${sale.date}</td><td>${sale.activity}</td><td>${sale.amount}</td><td>${sale.paymentMethod}</td></tr>`;
      });
      salesHtml += `</table>`;
      let totalAmount = salesByMonth[currentYear][month].reduce((acc, sale) => acc + parseFloat(sale.amount), 0);
      salesHtml += `<p>Total Amount for ${month}: ${totalAmount}</p>`;
    });
    document.getElementById('sales-data').innerHTML = salesHtml;

    // Calculate total amount for all months
    let totalAmountForYear = Object.values(salesByMonth[currentYear]).flat().reduce((acc, sale) => acc + parseFloat(sale.amount), 0);
    console.log(`Total Amount for ${currentYear}: ${totalAmountForYear}`);
  } else {
    document.getElementById('sales-data').innerHTML = 'No sales data available';
  }

  // Search functionality
  document.getElementById('search-btn').addEventListener('click', () => {
    let searchInput = document.getElementById('search-input').value.toLowerCase();
    let filteredSales = salesData.filter(sale => {
      return sale.date.toLowerCase().includes(searchInput) ||
             sale.activity.toLowerCase().includes(searchInput) ||
             sale.amount.toString().includes(searchInput) ||
             sale.paymentMethod.toLowerCase().includes(searchInput);
    });

    let filteredSalesHtml = '';
    filteredSales.forEach(sale => {
      filteredSalesHtml += `<p>Date: ${sale.date}, Activity: ${sale.activity}, Amount: ${sale.amount}, Payment Method: ${sale.paymentMethod}</p>`;
    });
    document.getElementById('sales-data').innerHTML = filteredSalesHtml;
  });

  // Print functionality
  document.getElementById('print-btn').addEventListener('click', () => {
    window.print();
  });
} else {
  document.getElementById('sales-data').innerHTML = 'No sales data available';
}
