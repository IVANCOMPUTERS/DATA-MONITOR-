            <li id="btn" style="cursor: pointer;"><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>
    </div>
    <div class="main-content">
        <h2>Sales</h2>
         <button id="link">View links</button>
        <form id="sales-form">
            <label for="date">Date:</label>
            <input type="date" id="date" name="date"><br><br>
            <label for="activity">Activity Done:</label>
            <input type="text" id="activity" name="activity"><br><br>
            <label for="amount">Amount Paid:</label>
            <input type="number" id="amount" name="amount"><br><br>
            <label for="payment-method">Form of Payment:</label>
            <select id="payment-method" name="payment-method">
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Mobile Money">Mobile Money</option>
            </select><br><br>
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        document.getElementById('sales-form').addEventListener('submit', function(event) {
    event.preventDefault();
    var date = document.getElementById('date').value;
    var activity = document.getElementById('activity').value;
    var amount = document.getElementById('amount').value;
    var paymentMethod = document.getElementById('payment-method').value;

    var salesData = {
        date: date,
        activity: activity,
        amount: amount,
        paymentMethod: paymentMethod
    };

    if (localStorage.getItem('sales') === null) {
        var salesArray = [];
        salesArray.push(salesData);
        localStorage.setItem('sales', JSON.stringify(salesArray));
    } else {
        var salesArray = JSON.parse(localStorage.getItem('sales'));
        salesArray.push(salesData);
        localStorage.setItem('sales', JSON.stringify(salesArray));
    }

    alert('Sales data saved successfully!');
    document.getElementById('sales-form').reset();
});

document.getElementById('link').addEventListener('click',function() {
