    <script>
        // Retrieve finance and sales data from local storage
var financeData = JSON.parse(localStorage.getItem('finance'));
var salesData = JSON.parse(localStorage.getItem('sales'));

// Organize finance and sales data by month and year
var financeByMonth = {};
var salesByMonth = {};
if (financeData !== null) {
  financeData.forEach(function(finance) {
    var date = new Date(finance.dateIssue);
    var month = date.toLocaleString('default', { month: 'long' });
    var year = date.getFullYear();
    if (!financeByMonth[year]) {
      financeByMonth[year] = {};
    }
    if (!financeByMonth[year][month]) {
      financeByMonth[year][month] = 0;
    }
    financeByMonth[year][month] += parseFloat(finance.amountSigned);
  });
}
if (salesData !== null) {
  salesData.forEach(function(sale) {
    var date = new Date(sale.date);
    var month = date.toLocaleString('default', { month: 'long' });
    var year = date.getFullYear();
    if (!salesByMonth[year]) {
      salesByMonth[year] = {};
    }
    if (!salesByMonth[year][month]) {
      salesByMonth[year][month] = 0;
    }
    salesByMonth[year][month] += parseFloat(sale.amount);
  });
}

// Display report data
var reportHtml = '';
Object.keys(financeByMonth).forEach(function(year) {
  reportHtml += `<h3>${year}</h3>`;
  reportHtml += `<table>`;
  reportHtml += `<tr><th>Month</th><th>Total Finance</th><th>Total Sales</th><th>Profit</th></tr>`;
  Object.keys(financeByMonth[year]).sort((a, b) => {
    var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    return months.indexOf(a) - months.indexOf(b);
  }).forEach(function(month) {
    var totalFinance = financeByMonth[year][month];
    var totalSales = salesByMonth[year] && salesByMonth[year][month] ? salesByMonth[year][month] : 0;
    var profit = totalSales - totalFinance;
    reportHtml += `<tr><td>${month}</td><td>${totalFinance}</td><td>${totalSales}</td><td>${profit}</td></tr>`;
  });
  reportHtml += `</table>`;
});
document.getElementById('report-data').innerHTML = reportHtml;
