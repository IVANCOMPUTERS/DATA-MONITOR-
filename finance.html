    </div>
    <div class="main-content">
        <h2>Finance</h2>
        <button id="link">View links</button>
        <form id="finance-form">
            <label for="date-issue">Date of Issue:</label>
            <input type="date" id="date-issue" name="date-issue"><br><br>
            <label for="amount-signed">Amount Signed:</label>
            <input type="number" id="amount-signed" name="amount-signed"><br><br>
            <label for="payment-method">Form of Payment:</label>
            <select id="payment-method" name="payment-method">
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Mobile Money">Mobile Money</option>
            </select><br><br>
            <label for="product-paid">Product Paid For:</label>
            <input type="text" id="product-paid" name="product-paid"><br><br>
            <label for="quantity-product">Quantity of Product:</label>
            <input type="number" id="quantity-product" name="quantity-product"><br><br>
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        const linkDisplay = document.getElementById('sidebar');
document.getElementById('link').addEventListener('click',function() {
  linkDisplay.style.display='block';
  reset();
});
const logoutBtn = document.getElementById('logout-btn');
const logoutModal = document.getElementById('logout-modal');
const yesBtn = document.getElementById('yes-btn');
const cancelBtn = document.getElementById('cancel-btn');

logoutBtn.addEventListener('click', () => {
    logoutModal.style.display = 'block';
});

yesBtn.addEventListener('click', () => {
    // Log out the user (for demo, just redirect to login page)
    window.location.href = 'file:///C:/Users/IT%20TECH%202025/Desktop/WEBSITES/IT%20DATA%20MONITOR%20SYSTEM/index.html';
});

cancelBtn.addEventListener('click', () => {
    logoutModal.style.display = 'none';
});

document.getElementById('finance-form').addEventListener('submit', function(event) {
    event.preventDefault();
    var dateIssue = document.getElementById('date-issue').value;
    var amountSigned = document.getElementById('amount-signed').value;
    var paymentMethod = document.getElementById('payment-method').value;
    var productPaid = document.getElementById('product-paid').value;
    var quantityProduct = document.getElementById('quantity-product').value;

    var financeData = {
        dateIssue: dateIssue,
        amountSigned: amountSigned,
        paymentMethod: paymentMethod,
        productPaid: productPaid,
        quantityProduct: quantityProduct
    };

    if (localStorage.getItem('finance') === null) {
        var financeArray = [];
        financeArray.push(financeData);
        localStorage.setItem('finance', JSON.stringify(financeArray));
    } else {
        var financeArray = JSON.parse(localStorage.getItem('finance'));
        financeArray.push(financeData);
        localStorage.setItem('finance', JSON.stringify(financeArray));
    }

    alert('Finance data saved successfully!');
    document.getElementById('finance-form').reset();
});
    </script>
